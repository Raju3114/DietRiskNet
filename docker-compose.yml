version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dietrisknet_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dietrisknet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: dietrisknet_backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/dietrisknet
      - SECRET_KEY=dietrisknet_super_secret_jwt_key_2026_capstone
      - MODELS_DIR=/app/backend/trained_models
      - NUTRITION_CSV_PATH=/app/nutrition/indian_food_nutrition_processed.csv
      - UPLOAD_DIR=/app/backend/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./backend/trained_models:/app/backend/trained_models
      - ./backend/uploads:/app/backend/uploads
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dietrisknet_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
