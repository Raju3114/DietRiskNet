services:
  - type: web
    name: dietrisknet-backend
    env: docker
    dockerfilepath: backend/Dockerfile
    dockercontext: .
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dietrisknet-db
          property: connectionString

databases:
  - name: dietrisknet-db
    plan: free
